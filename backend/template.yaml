AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Numerai Dashboard API

Globals:
  Function:
    Timeout: 60
    MemorySize: 512
    Runtime: python3.9
    Environment:
      Variables:
        DB_HOST: !Ref DBHost
        DB_PORT: !Ref DBPort
        DB_NAME: !Ref DBName
        DB_USER: !Ref DBUser
        DB_PASSWORD: !Ref DBPassword
        SAGEMAKER_ROLE_ARN: !Ref SagemakerRoleArn
        SAGEMAKER_ECR_IMAGE: !Ref SagemakerEcrImage
        ML_S3_BUCKET: !Ref MlS3Bucket
        ML_POLLER_API_KEY: !Ref MlPollerApiKey
        NUMERAI_PUBLIC_ID: !Ref NumeraiPublicId
        NUMERAI_SECRET_KEY: !Ref NumeraiSecretKey
        ENVIRONMENT: 'production'

Parameters:
  DBHost:
    Type: String
  DBPort:
    Type: String
    Default: '5432'
  DBName:
    Type: String
    Default: 'numeraidashboard'
  DBUser:
    Type: String
    Default: 'postgres'
  DBPassword:
    Type: String
    NoEcho: true
  SagemakerRoleArn:
    Type: String
    Default: ''
  SagemakerEcrImage:
    Type: String
    Default: ''
  MlS3Bucket:
    Type: String
    Default: 'numeraidashboard-ml'
  MlPollerApiKey:
    Type: String
    NoEcho: true
    Default: ''
  NumeraiPublicId:
    Type: String
    Default: ''
  NumeraiSecretKey:
    Type: String
    NoEcho: true
    Default: ''

Resources:
  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: handler.handler
      Events:
        ApiProxy:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: ANY
        Root:
          Type: Api
          Properties:
            Path: /
            Method: ANY
      Policies:
        - AmazonSageMakerFullAccess
        - AmazonS3FullAccess

Outputs:
  ApiUrl:
    Description: 'API Gateway endpoint URL for Prod stage'
    Value: !Sub 'https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/'
